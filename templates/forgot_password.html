<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Jottask</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="theme-color" content="#6366F1">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --success: #10B981;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo svg { width: 48px; height: 48px; }
        .auth-logo h1 { color: var(--primary); font-size: 24px; margin-top: 12px; }
        .auth-logo p { color: var(--gray-500); font-size: 14px; margin-top: 8px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: var(--gray-700); }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #D1FAE5; color: #065F46; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 512 512">
                <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8B5CF6" />
                        <stop offset="100%" style="stop-color:#6366F1" />
                    </linearGradient>
                </defs>
                <rect width="512" height="512" rx="96" fill="white"/>
                <rect x="120" y="80" width="220" height="300" rx="24" fill="url(#grad3)"/>
                <circle cx="310" cy="350" r="70" fill="#10B981"/>
                <path d="M275 350 L300 375 L355 315" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Reset Password</h1>
            <p>Enter your email and we'll send you a reset link.</p>
        </div>

        {% if sent %}
        <div class="alert alert-success">
            If an account exists for <strong>{{ email }}</strong>, you'll receive a password reset email shortly. Check your inbox and spam folder.
        </div>
        <p style="text-align: center; margin-top: 16px;">
            <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 500;">Back to login</a>
        </p>
        {% else %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" required autofocus placeholder="you@company.com.au">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Send Reset Link
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px;">
            <a href="{{ url_for('login') }}" style="color: var(--gray-500); font-size: 14px;">Back to login</a>
        </p>
        {% endif %}
    </div>
</div>
</body>
</html>
